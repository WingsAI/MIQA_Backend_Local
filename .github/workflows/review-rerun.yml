name: review-rerun

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]

jobs:
  request-review:
    name: request-review-on-push
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Request re-review with SHA dedupe
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha;
            const marker = '<!-- miqa-review-rerun -->';
            const trigger = `sha:${headSha}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const alreadyRequested = comments.data.some(
              (c) => c.body.includes(marker) && c.body.includes(trigger)
            );

            if (!alreadyRequested) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `${marker}\nNew commit pushed — requesting re-review for current head.\n${trigger}`,
              });
              console.log(`Re-review requested for ${headSha}`);
            } else {
              console.log(`Re-review already requested for ${headSha}, skipping.`);
            }
